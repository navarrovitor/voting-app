services:
  - type: web
    name: party-voting-app
    runtime: ruby
    buildCommand: bundle install && bundle exec rails db:migrate db:seed
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: party-voting-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_HOST
        sync: false
      - key: APP_PROTOCOL
        value: https
      - key: MAIL_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
    healthCheckPath: /health

databases:
  - name: party-voting-db
    databaseName: voting_app
    plan: free
