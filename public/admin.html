<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Votação da Festa</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0}
.app{max-width:640px;margin:0 auto;padding:0 16px 60px}
h1{font-size:24px;font-weight:800;padding:24px 0 20px}
h2{font-size:18px;font-weight:700;margin-bottom:14px}
h3{font-size:13px;font-weight:600;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:16px}
input[type=password],input[type=text]{width:100%;padding:12px 14px;border-radius:8px;border:2px solid #334155;background:#0f172a;color:#e2e8f0;font-size:15px;outline:none;transition:border-color 0.2s}
.add-code{width:90px!important;text-transform:uppercase;letter-spacing:2px;font-family:monospace;font-weight:700}
input:focus{border-color:#7c3aed}
.btn{padding:10px 18px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s}
.btn-primary{background:#7c3aed;color:#fff}
.btn-primary:hover{background:#6d28d9}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover:not(:disabled){background:#b91c1c}
.btn-success{background:#059669;color:#fff}
.btn-success:hover:not(:disabled){background:#047857}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-outline{background:transparent;border:1px solid #475569;color:#94a3b8}
.btn-outline:hover{border-color:#7c3aed;color:#7c3aed}
.btn-export{background:#0f766e;color:#fff}
.btn-export:hover{background:#0d9488}
.btn:disabled{opacity:0.45;cursor:not-allowed}
.row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.row:last-child{margin-bottom:0}
.cname{flex:1;font-size:14px;font-weight:500}
.ccode{font-size:11px;font-weight:700;letter-spacing:1px;color:#a78bfa;background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.3);border-radius:5px;padding:2px 7px;margin-right:4px;font-family:monospace}
.tgrp{display:flex;gap:6px}
.btn-present{background:#0f766e;color:#fff;border:none}
.btn-present:hover{background:#0d9488}
.btn-absent{background:transparent;border:1px solid #475569;color:#64748b}
.btn-absent:hover{border-color:#0f766e;color:#0d9488}
.status-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.status-label{font-size:14px;flex:1}
.big-status{font-size:28px;font-weight:800}
.open{color:#34d399}
.closed{color:#f87171}
.result-row{display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid #1e293b}
.result-row:last-child{border-bottom:none}
.result-rank{font-size:18px;width:28px;text-align:center}
.result-name{flex:1;font-size:14px}
.result-pts{font-size:13px;color:#a78bfa;font-weight:700}
.result-votes{font-size:12px;color:#64748b}
.add-form{display:flex;gap:8px;margin-top:14px}
.add-form input{flex:1}
.error{color:#f87171;font-size:13px;margin-top:6px}
.ok{color:#34d399;font-size:13px;margin-top:6px}
.spinner{width:32px;height:32px;margin:40px auto;border:3px solid rgba(255,255,255,0.1);border-top-color:#7c3aed;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{flex:1;padding:10px;border-radius:8px;border:1px solid #334155;background:transparent;color:#64748b;font-weight:600;cursor:pointer;font-size:13px}
.tab.active{border-color:#7c3aed;background:rgba(124,58,237,0.15);color:#a78bfa}
.divider{border:none;border-top:1px solid #334155;margin:14px 0}
.qr-section{display:flex;align-items:center;gap:16px;padding:16px;background:#0f172a;border-radius:10px;margin-bottom:16px}
.qr-section img{border-radius:6px;background:#fff;padding:4px;flex-shrink:0}
.qr-info{flex:1;min-width:0}
.qr-url{font-size:12px;color:#64748b;word-break:break-all;margin-top:4px}
</style>
</head>
<body>
<div id="root"><div class="app"><div class="spinner" style="margin-top:80px"></div></div></div>
<script>
const html = htm.bind(React.createElement);
const { useState, useEffect } = React;

function api(path, opts = {}) {
  const token = localStorage.getItem("admin_token");
  return fetch(path, {
    headers: { "Content-Type": "application/json", ...(token ? { Authorization: `Bearer ${token}` } : {}) },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  }).then(async r => {
    if (r.status === 204) { if (!r.ok) throw new Error("Falhou"); return null; }
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || "Falhou");
    return data;
  });
}

function exportCSV(contestants) {
  const rows = [["Nome", "Código"], ...contestants.map(c => [c.name, c.code || ""])];
  const csv = rows.map(r => r.map(v => `"${v.replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "participantes.csv"; a.click();
  URL.revokeObjectURL(url);
}

function LoginPage({ onLogin }) {
  const [pw, setPw] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  async function submit(e) {
    e.preventDefault();
    setLoading(true); setError("");
    try {
      const data = await api("/admin/login", { method: "POST", body: { password: pw } });
      localStorage.setItem("admin_token", data.token);
      onLogin();
    } catch { setError("Senha incorreta"); }
    finally { setLoading(false); }
  }

  return html`
    <div class="app">
      <h1>🔐 Login Administrador</h1>
      <div class="card">
        <form onSubmit=${submit}>
          <input type="password" placeholder="Senha de administrador" value=${pw}
            onInput=${e => setPw(e.target.value)} autoFocus/>
          ${error && html`<div class="error">${error}</div>`}
          <button class="btn btn-primary" style=${{ marginTop:"12px", width:"100%" }} disabled=${loading}>
            ${loading ? "..." : "Entrar"}
          </button>
        </form>
      </div>
    </div>
  `;
}

function Dashboard() {
  const [tab, setTab] = useState("contestants");
  const [contestants, setContestants] = useState([]);
  const [settings, setSettings] = useState({ voting_open: false, results_public: false });
  const [results, setResults] = useState(null);
  const [newName, setNewName] = useState("");
  const [newCode, setNewCode] = useState("");
  const [msg, setMsg] = useState("");
  const [loading, setLoading] = useState(true);

  const appUrl = window.location.origin + "/";
  const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=" + encodeURIComponent(appUrl);

  async function load() {
    const [cs, st] = await Promise.all([api("/admin/contestants"), api("/admin/settings")]);
    setContestants(cs);
    setSettings(st);
    setLoading(false);
  }

  useEffect(() => { load(); }, []);
  useEffect(() => { if (tab === "results") api("/admin/results").then(setResults); }, [tab]);

  async function addContestant() {
    if (!newName.trim()) return;
    const body = { name: newName.trim() };
    if (newCode.trim()) body.code = newCode.trim().toUpperCase();
    const c = await api("/admin/contestants", { method: "POST", body });
    setContestants(prev => [...prev, c]);
    setNewName(""); setNewCode("");
  }

  async function toggleField(id, field) {
    const c = contestants.find(x => x.id === id);
    const updated = await api(`/admin/contestants/${id}`, { method: "PATCH", body: { [field]: !c[field] } });
    setContestants(prev => prev.map(x => x.id === id ? updated : x));
  }

  async function deleteContestant(id) {
    if (!confirm("Excluir este participante?")) return;
    await api(`/admin/contestants/${id}`, { method: "DELETE" });
    setContestants(prev => prev.filter(x => x.id !== id));
  }

  async function updateSetting(key, value) {
    await api("/admin/settings", { method: "POST", body: { [key]: value } });
    setSettings(prev => ({ ...prev, [key]: value }));
    setMsg("✓ Salvo"); setTimeout(() => setMsg(""), 2000);
  }

  const medals = ["🥇","🥈","🥉"];
  const tabs = [["contestants","Participantes"],["voting","Votação"],["results","Resultados"]];

  if (loading) return html`<div class="app"><div class="spinner"></div></div>`;

  return html`
    <div class="app">
      <h1>🎉 Admin da Festa</h1>
      <div class="tabs">
        ${tabs.map(([t, label]) => html`
          <button key=${t} class=${"tab"+(tab===t?" active":"")} onClick=${() => setTab(t)}>
            ${label}
          </button>
        `)}
      </div>

      ${tab === "contestants" && html`
        <div>
          <div class="qr-section">
            <img src=${qrUrl} alt="QR" width="100" height="100"/>
            <div class="qr-info">
              <div style=${{ fontSize:"13px", fontWeight:"700", color:"#e2e8f0" }}>QR Code da Votação</div>
              <div class="qr-url">${appUrl}</div>
              <div style=${{ marginTop:"8px", display:"flex", gap:"8px", flexWrap:"wrap" }}>
                <button class="btn btn-sm btn-export" onClick=${() => exportCSV(contestants)}>
                  ↓ Exportar Lista
                </button>
              </div>
            </div>
          </div>

          <div class="card">
            <h2>Participantes</h2>
            <h3>Lista — marque presença e categorias</h3>
            ${contestants.map(c => html`
              <div key=${c.id} class="row">
                <span class="ccode">${c.code||"—"}</span>
                <span class="cname">${c.name}</span>
                <div class="tgrp">
                  <button class=${"btn btn-sm "+(c.present?"btn-present":"btn-absent")}
                    onClick=${() => toggleField(c.id, "present")} title="Presente na festa">
                    ${c.present?"✓ Presente":"Ausente"}
                  </button>
                  <button class=${"btn btn-sm "+(c.singing_enabled?"btn-success":"btn-outline")}
                    onClick=${() => toggleField(c.id, "singing_enabled")}>🎤</button>
                  <button class=${"btn btn-sm "+(c.costume_enabled?"btn-success":"btn-outline")}
                    onClick=${() => toggleField(c.id, "costume_enabled")}>👗</button>
                  <button class="btn btn-sm btn-danger" onClick=${() => deleteContestant(c.id)}>✕</button>
                </div>
              </div>
            `)}
            <hr class="divider"/>
            <h3>Adicionar Participante</h3>
            <div class="add-form">
              <input type="text" placeholder="Nome" value=${newName}
                onInput=${e => setNewName(e.target.value)}
                onKeyDown=${e => e.key==="Enter" && addContestant()}/>
              <input class="add-code" type="text" placeholder="Código (auto)" value=${newCode}
                maxLength="4"
                onInput=${e => setNewCode(e.target.value.toUpperCase())}
                onKeyDown=${e => e.key==="Enter" && addContestant()}/>
              <button class="btn btn-primary" onClick=${addContestant}>Adicionar</button>
            </div>
            <div style=${{ fontSize:"11px", color:"#94a3b8", marginTop:"6px" }}>
              Deixe o código em branco para gerar automaticamente.
            </div>
          </div>
        </div>
      `}

      ${tab === "voting" && html`
        <div>
          <div class="card">
            <h2>Status da Votação</h2>
            <div class="status-row">
              <span class="status-label">Status:</span>
              <span class=${"big-status "+(settings.voting_open?"open":"closed")}>
                ${settings.voting_open ? "ABERTA" : "FECHADA"}
              </span>
            </div>
            <div style=${{ display:"flex", gap:"8px" }}>
              <button class="btn btn-success" disabled=${settings.voting_open}
                onClick=${() => updateSetting("voting_open", true)}>Abrir Votação</button>
              <button class="btn btn-danger" disabled=${!settings.voting_open}
                onClick=${() => updateSetting("voting_open", false)}>Fechar Votação</button>
            </div>
          </div>
          <div class="card">
            <h2>Visibilidade dos Resultados</h2>
            <div class="status-row">
              <span class="status-label">Resultados públicos:</span>
              <span class=${"big-status "+(settings.results_public?"open":"closed")}>
                ${settings.results_public ? "SIM" : "NÃO"}
              </span>
            </div>
            <div style=${{ display:"flex", gap:"8px" }}>
              <button class="btn btn-success" disabled=${settings.results_public}
                onClick=${() => updateSetting("results_public", true)}>Mostrar Resultados</button>
              <button class="btn btn-danger" disabled=${!settings.results_public}
                onClick=${() => updateSetting("results_public", false)}>Ocultar Resultados</button>
            </div>
            ${msg && html`<div class="ok">${msg}</div>`}
          </div>
        </div>
      `}

      ${tab === "results" && results && html`
        <div>
          <div class="card">
            <div style=${{ display:"flex", gap:"16px", fontSize:"14px", color:"#94a3b8" }}>
              <span>Total de votantes: <strong style=${{ color:"#e2e8f0" }}>${results.total_voters}</strong></span>
              <span>Votação: <strong style=${{ color: results.voting_open?"#34d399":"#f87171" }}>
                ${results.voting_open?"Aberta":"Fechada"}
              </strong></span>
            </div>
          </div>
          ${Object.entries(results.results).map(([cat, rows]) => html`
            <div key=${cat} class="card">
              <h2>${cat==="singing"?"🎤 Melhor Canto":"👗 Melhor Fantasia"}</h2>
              ${rows.length === 0
                ? html`<p style=${{ color:"#64748b", fontSize:"14px" }}>Sem votos ainda</p>`
                : rows.map((r, i) => html`
                    <div key=${r.id} class="result-row">
                      <span class="result-rank">${medals[i]||(i+1)+"."}</span>
                      <span class="result-name">${r.name}</span>
                      <span class="result-pts">${r.points} pts</span>
                      <span class="result-votes">${r.votes} votos</span>
                    </div>
                  `)
              }
            </div>
          `)}
        </div>
      `}

      <button class="btn btn-outline" style=${{ marginTop:"8px" }}
        onClick=${() => { localStorage.removeItem("admin_token"); window.location.reload(); }}>
        Sair
      </button>
    </div>
  `;
}

function App() {
  const [authed, setAuthed] = useState(!!localStorage.getItem("admin_token"));
  return authed
    ? html`<${Dashboard}/>`
    : html`<${LoginPage} onLogin=${() => setAuthed(true)}/>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
