<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>🎭 The Grand Vote</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#050210}
body{font-family:'DM Sans',sans-serif}
input{color-scheme:dark}
input::placeholder{color:rgba(248,244,255,0.28)}
input:focus{outline:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(168,85,247,0.4);border-radius:2px}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatY{0%,100%{transform:translateY(0px)}50%{transform:translateY(-8px)}}
@keyframes starPulse{0%,100%{opacity:0.2;transform:scale(0.75)}50%{opacity:0.85;transform:scale(1)}}

.shell{background:#050210;min-height:100svh;display:flex;justify-content:center}
.phone{width:100%;max-width:430px;background:#0d0618;position:relative}
.spotlight{position:absolute;top:0;left:0;right:0;height:420px;background:radial-gradient(ellipse at 50% 0%,rgba(168,85,247,0.22) 0%,transparent 70%);pointer-events:none;z-index:0}
.curtain-l{position:absolute;inset:0 auto 0 0;width:26px;background:linear-gradient(to right,rgba(90,10,38,0.95),transparent);pointer-events:none;z-index:2}
.curtain-r{position:absolute;inset:0 0 0 auto;width:26px;background:linear-gradient(to left,rgba(90,10,38,0.95),transparent);pointer-events:none;z-index:2}

/* Stars */
.star{position:absolute;font-size:10px;color:rgba(245,200,66,0.7);animation:starPulse 2.8s ease-in-out infinite}

/* Center screen (welcome, done) */
.screen-center{min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 36px;position:relative;z-index:1;animation:fadeUp 0.7s ease both}

/* Flow screen (categories, review) */
.screen-flow{min-height:100svh;display:flex;flex-direction:column;padding:58px 24px 44px;position:relative;z-index:1;animation:fadeUp 0.5s ease both}

/* Full-height scroll screen (voting) */
.screen-vote{height:100svh;display:flex;flex-direction:column;position:relative;z-index:1;animation:fadeUp 0.4s ease both}

.float-icon{animation:floatY 3.2s ease-in-out infinite;line-height:1}
.gold-label{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:rgba(245,200,66,0.85);font-weight:600;margin-bottom:14px}
.display-h1{font-family:'Playfair Display',serif;font-size:62px;font-weight:900;color:#f8f4ff;line-height:0.93;text-align:center;letter-spacing:-1px}
.display-h2{font-family:'Playfair Display',serif;font-size:36px;color:#f8f4ff;font-weight:700;line-height:1.1}
.display-h2-lg{font-family:'Playfair Display',serif;font-size:48px;font-weight:900;color:#f8f4ff;line-height:1.0}
.divider-bar{width:54px;height:2px;background:linear-gradient(90deg,#a855f7,#ec4899);margin:24px auto}
.muted{color:rgba(248,244,255,0.48);font-size:14px;line-height:1.75;text-align:center}

/* Primary CTA */
.btn-grad{background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff;border:none;border-radius:50px;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:0.3px;box-shadow:0 8px 36px rgba(168,85,247,0.48);font-family:'DM Sans',sans-serif;padding:18px 56px}
.btn-grad-full{background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff;border:none;padding:18px;border-radius:16px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 6px 32px rgba(168,85,247,0.42);font-family:'DM Sans',sans-serif;letter-spacing:0.3px;width:100%}
.btn-ghost{width:100%;background:rgba(255,255,255,0.06);color:rgba(248,244,255,0.5);border:1px solid rgba(255,255,255,0.1);padding:15px;border-radius:14px;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}

/* Stats row */
.stats-row{display:flex;gap:28px;margin-top:44px;align-items:center}
.stat{text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:24px;color:#f8f4ff;font-weight:700}
.stat-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(248,244,255,0.32);margin-top:3px}
.stat-divider{width:1px;height:38px;background:rgba(255,255,255,0.1)}

/* Email input */
.email-wrap{width:100%;max-width:320px;margin:0 auto 16px}
.email-input{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:16px 18px;color:#f8f4ff;font-size:16px;font-family:'DM Sans',sans-serif;caret-color:#a855f7}
.email-input:focus{border-color:rgba(168,85,247,0.6);background:rgba(168,85,247,0.08)}
.err-msg{color:#f87171;font-size:13px;text-align:center;margin-top:8px;min-height:18px}

/* QR */
.qr-wrap{margin-top:36px;text-align:center}
.qr-hint{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(248,244,255,0.22);margin-bottom:10px}

/* Check email screen */
.check-icon{font-size:52px;margin-bottom:22px;animation:floatY 3s ease-in-out infinite;line-height:1}

/* Category cards */
.cat-header{text-align:center;margin-bottom:40px}
.cat-header-label{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(245,200,66,0.82);font-weight:600;margin-bottom:9px}
.cat-card-icon{width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.cat-card-title{color:#f8f4ff;font-size:18px;font-weight:600;line-height:1.2}
.cat-card-sub{color:rgba(248,244,255,0.4);font-size:13px;margin-top:3px}
.cat-prog-track{height:4px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden}
.cat-prog-info{display:flex;justify-content:space-between;align-items:center;margin-top:9px;font-size:12px;color:rgba(248,244,255,0.35)}
.cat-footer{margin-top:auto}
.cat-divider{height:1px;background:rgba(255,255,255,0.07);margin-bottom:20px}
.cat-hint{text-align:center;color:rgba(248,244,255,0.26);font-size:13px}

/* Voting header */
.vote-header{flex-shrink:0;padding:18px 20px 10px}
.vote-back{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.65);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'DM Sans',sans-serif;line-height:1}
.vote-cat-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(248,244,255,0.36);margin-bottom:3px}
.vote-cat-title{font-family:'Playfair Display',serif;font-size:21px;color:#f8f4ff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-slots{display:flex;gap:7px;margin-top:14px}
.rank-slot{flex:1;min-width:0;padding:8px 10px;border-radius:10px}
.rank-slot-rank{font-size:9px;letter-spacing:1px;font-weight:700;margin-bottom:4px;opacity:0.6}
.rank-slot-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:15px}

/* Search */
.search-wrap{flex-shrink:0;padding:8px 20px 10px;position:relative}
.search-icon{position:absolute;left:33px;top:50%;transform:translateY(-50%);font-size:14px;color:rgba(255,255,255,0.28);pointer-events:none;user-select:none;line-height:1}
.search-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 14px 12px 38px;color:#f8f4ff;font-size:15px;font-family:'DM Sans',sans-serif;caret-color:#a855f7}

/* Contestant list */
.contestant-list{flex:1;overflow-y:auto;padding:0 20px}
.vote-footer{flex-shrink:0;padding:10px 20px 38px;background:linear-gradient(to top,#0d0618 70%,rgba(13,6,24,0) 100%)}

/* Review */
.review-section-label{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.review-section-text{font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:700}
.review-divider{height:1px;background:rgba(255,255,255,0.08);margin-bottom:32px}
.review-actions{display:flex;flex-direction:column;gap:12px}

/* Done summary */
.done-summary{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:20px;padding:22px;width:100%;max-width:330px}
.done-summary-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(248,244,255,0.32);margin-bottom:18px}
.done-col{flex:1;min-width:0}
.done-col-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:11px}
.done-col-item{color:rgba(248,244,255,0.62);font-size:13px;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.done-col-divider{width:1px;background:rgba(255,255,255,0.07);flex-shrink:0}
</style>
</head>
<body>
<div id="root"><div class="shell"><div class="phone"><div class="spotlight"></div><div style="min-height:100svh;display:flex;align-items:center;justify-content:center"><div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.08);border-top-color:#a855f7;border-radius:50%;animation:spin 0.8s linear infinite"></div></div></div></div></div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script>
window.onerror = function(msg,src,line,_,err){
  document.getElementById("root").innerHTML =
    '<div style="color:#f87171;padding:24px;font-family:monospace;background:#0d0618;min-height:100vh;white-space:pre-wrap">Error: '+msg+'\n'+(err&&err.stack||src+':'+line)+'</div>';
};

const html = htm.bind(React.createElement);
const { useState, useEffect } = React;

const RANK_COLORS  = ['#f5c842','#c8c8c8','#cd7f32'];
const RANK_BGS     = ['rgba(245,200,66,0.12)','rgba(200,200,200,0.1)','rgba(205,127,50,0.12)'];
const RANK_BORDERS = ['rgba(245,200,66,0.3)','rgba(200,200,200,0.28)','rgba(205,127,50,0.3)'];
const RANK_LABELS  = ['1ST','2ND','3RD'];
const RANK_MEDALS  = ['🥇','🥈','🥉'];

function api(path, opts = {}) {
  const token = localStorage.getItem("session_token");
  return fetch(path, {
    headers: { "Content-Type": "application/json", ...(token ? { Authorization: `Bearer ${token}` } : {}) },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  }).then(async r => {
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || "Request failed");
    return data;
  });
}

/* ── Stars decoration ── */
function Stars() {
  const stars = [
    { top:"92px", left:"54px",  size:"10px", color:"rgba(245,200,66,0.7)",   dur:"2.8s", delay:"0s"    },
    { top:"164px",right:"62px", size:"7px",  color:"rgba(236,72,153,0.55)",  dur:"3.3s", delay:"0.6s"  },
    { top:"248px",left:"70px",  size:"6px",  color:"rgba(168,85,247,0.55)",  dur:"2.5s", delay:"1.2s"  },
    { bottom:"200px",right:"54px",size:"9px",color:"rgba(245,200,66,0.45)",  dur:"3.7s", delay:"0.3s"  },
    { bottom:"300px",left:"46px", size:"8px",color:"rgba(236,72,153,0.45)",  dur:"2.9s", delay:"0.9s"  },
  ];
  return stars.map((s, i) => html`
    <div key=${i} style=${{ position:"absolute", fontSize:s.size, color:s.color,
      animation:`starPulse ${s.dur} ease-in-out infinite ${s.delay}`,
      top:s.top, bottom:s.bottom, left:s.left, right:s.right }}>✦</div>
  `);
}

/* ── Welcome / Email entry ── */
function WelcomePage({ onSent }) {
  const [email, setEmail] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=" + encodeURIComponent(window.location.origin + "/");

  async function submit(e) {
    e.preventDefault();
    if (!email.trim()) return;
    setLoading(true); setError("");
    try {
      await api("/api/auth/request", { method:"POST", body:{ email } });
      onSent(email);
    } catch(err) { setError(err.message); }
    finally { setLoading(false); }
  }

  return html`
    <div class="screen-center">
      <div class="curtain-l"></div>
      <div class="curtain-r"></div>
      <${Stars}/>
      <div class="float-icon" style=${{ fontSize:"54px", marginBottom:"26px" }}>🎭</div>
      <div class="gold-label">Private Party</div>
      <h1 class="display-h1">The<br/>Grand<br/>Vote</h1>
      <div class="divider-bar"></div>
      <p class="muted" style=${{ maxWidth:"256px", marginBottom:"36px" }}>
        Two categories · Three picks each<br/>Cast your vote for tonight's stars
      </p>
      <form onSubmit=${submit} style=${{ width:"100%", maxWidth:"320px" }}>
        <input class="email-input" type="email" placeholder="your@email.com"
          value=${email} onInput=${e => setEmail(e.target.value)} required/>
        <div class="err-msg">${error}</div>
        <button class="btn-grad" type="submit" disabled=${loading}
          style=${{ width:"100%", marginTop:"4px", padding:"18px", borderRadius:"14px" }}>
          ${loading ? "Sending…" : "Get My Voting Link ✦"}
        </button>
      </form>
      <div class="qr-wrap">
        <div class="qr-hint">Scan to open on your phone</div>
        <img src=${qrUrl} alt="QR" width="120" height="120"
             style=${{ borderRadius:"8px", background:"#fff", padding:"6px", display:"block", margin:"0 auto" }}/>
      </div>
      <div class="stats-row">
        <div class="stat"><div class="stat-num">2</div><div class="stat-label">Categories</div></div>
        <div class="stat-divider"></div>
        <div class="stat"><div class="stat-num">3</div><div class="stat-label">Picks Each</div></div>
      </div>
    </div>
  `;
}

/* ── Check email ── */
function CheckEmailPage({ email, onBack }) {
  return html`
    <div class="screen-center">
      <div class="curtain-l"></div>
      <div class="curtain-r"></div>
      <div class="check-icon">✉️</div>
      <div class="gold-label">Link Sent!</div>
      <h1 class="display-h1" style=${{ fontSize:"44px", marginBottom:"0" }}>Check<br/>Your<br/>Email</h1>
      <div class="divider-bar"></div>
      <p class="muted" style=${{ maxWidth:"272px", marginBottom:"40px" }}>
        We sent a magic link to<br/><strong style=${{ color:"#f8f4ff" }}>${email}</strong><br/>
        Click it to start voting. Expires in 30 min.
      </p>
      <button class="btn-ghost" style=${{ maxWidth:"320px", width:"100%" }} onClick=${onBack}>
        ← Try a different email
      </button>
    </div>
  `;
}

/* ── Categories ── */
function CategoriesPage({ categories, localVotes, onSelectCategory, onReview }) {
  const sCount = localVotes.singing.length;
  const cCount = localVotes.costume.length;
  const sDone  = sCount === 3;
  const cDone  = cCount === 3;
  const both   = sDone && cDone;

  const cardStyle = (done, rgb) => ({
    background: done ? `rgba(${rgb},0.1)` : 'rgba(255,255,255,0.04)',
    border: `1px solid ${done ? `rgba(${rgb},0.28)` : 'rgba(255,255,255,0.1)'}`,
    borderRadius: '20px', padding: '20px', cursor: 'pointer',
  });
  const badgeStyle = (done, count, rgb) => ({
    padding:'4px 10px', borderRadius:'50px', fontSize:'12px', fontWeight:'700',
    letterSpacing:'0.3px', flexShrink:0,
    background: done ? `rgba(${rgb},0.2)` : count > 0 ? 'rgba(255,255,255,0.08)' : 'transparent',
    color:      done ? `rgb(${rgb})`       : count > 0 ? 'rgba(255,255,255,0.52)' : 'transparent',
    border:     done ? `1px solid rgba(${rgb},0.3)` : '1px solid transparent',
  });
  const barStyle = (count, rgb) => ({
    height:'100%', borderRadius:'4px', transition:'width 0.35s ease',
    width: `${(count / 3) * 100}%`,
    background: count === 3
      ? `linear-gradient(90deg,rgb(${rgb}),rgba(${rgb},0.55))`
      : `rgba(${rgb},0.5)`,
  });
  const namesPreview = arr => arr.length ? arr.map(c => c.name.split(' ')[0]).join(' · ') : null;

  const stepLabel = !sDone ? 'Step 1 of 2' : !cDone ? 'Step 2 of 2' : 'All done ✓';

  return html`
    <div class="screen-flow">
      <div class="cat-header">
        <div class="cat-header-label">${stepLabel}</div>
        <h2 class="display-h2">Cast Your Vote</h2>
        <p style=${{ color:"rgba(248,244,255,0.38)", fontSize:"14px", marginTop:"7px" }}>Pick your top 3 in each category</p>
      </div>

      <!-- Singing -->
      <div onClick=${() => onSelectCategory("singing")} style=${cardStyle(sDone,"168,85,247")}>
        <div style=${{ display:"flex", alignItems:"center", gap:"14px", marginBottom:"14px" }}>
          <div class="cat-card-icon" style=${{ background:"rgba(168,85,247,0.14)", border:"1px solid rgba(168,85,247,0.22)" }}>🎤</div>
          <div style=${{ flex:1, minWidth:0 }}>
            <div class="cat-card-title">Singing Performance</div>
            <div class="cat-card-sub">${categories.singing.length} performers</div>
          </div>
          <div style=${badgeStyle(sDone, sCount, "168,85,247")}>
            ${sDone ? "DONE ✓" : sCount > 0 ? `${sCount}/3` : ""}
          </div>
        </div>
        <div class="cat-prog-track"><div style=${barStyle(sCount,"168,85,247")}></div></div>
        <div class="cat-prog-info">
          <span>${sCount} of 3 selected</span>
          <span>${namesPreview(localVotes.singing) || "Tap to vote →"}</span>
        </div>
      </div>

      <div style=${{ height:"14px" }}></div>

      <!-- Costume -->
      <div onClick=${() => onSelectCategory("costume")} style=${cardStyle(cDone,"236,72,153")}>
        <div style=${{ display:"flex", alignItems:"center", gap:"14px", marginBottom:"14px" }}>
          <div class="cat-card-icon" style=${{ background:"rgba(236,72,153,0.14)", border:"1px solid rgba(236,72,153,0.22)" }}>👑</div>
          <div style=${{ flex:1, minWidth:0 }}>
            <div class="cat-card-title">Best Costume</div>
            <div class="cat-card-sub">${categories.costume.length} contestants</div>
          </div>
          <div style=${badgeStyle(cDone, cCount, "236,72,153")}>
            ${cDone ? "DONE ✓" : cCount > 0 ? `${cCount}/3` : ""}
          </div>
        </div>
        <div class="cat-prog-track"><div style=${barStyle(cCount,"236,72,153")}></div></div>
        <div class="cat-prog-info">
          <span>${cCount} of 3 selected</span>
          <span>${namesPreview(localVotes.costume) || "Tap to vote →"}</span>
        </div>
      </div>

      <div style=${{ flex:1, minHeight:"36px" }}></div>

      ${both ? html`
        <div style=${{ animation:"fadeUp 0.4s ease both" }}>
          <div class="cat-divider"></div>
          <button class="btn-grad-full" onClick=${onReview}>Review &amp; Submit →</button>
        </div>
      ` : html`
        <div>
          <div class="cat-divider"></div>
          <div class="cat-hint">Complete both categories to submit</div>
        </div>
      `}
    </div>
  `;
}

/* ── Voting ── */
function VotingPage({ category, contestants, picks, onSave, onBack }) {
  const [selected, setSelected] = useState(picks);
  const [search, setSearch] = useState("");

  const toggle = (c) => {
    setSelected(prev => {
      const idx = prev.findIndex(p => p.id === c.id);
      if (idx >= 0) { const n = [...prev]; n.splice(idx,1); return n; }
      if (prev.length < 3) return [...prev, c];
      return prev;
    });
  };

  const filtered = contestants.filter(c => !search || c.name.toLowerCase().includes(search.toLowerCase()));
  const ready = selected.length === 3;
  const catTitle = category === "singing" ? "Singing Performance" : "Best Costume";
  const catLabel = category === "singing" ? "Category 1 of 2" : "Category 2 of 2";

  const slotStyle = (i, rgb) => ({
    flex:1, minWidth:0, padding:"8px 10px", borderRadius:"10px",
    background: selected[i] ? `rgba(${rgb},0.1)` : "rgba(255,255,255,0.04)",
    border: `1px solid ${selected[i] ? `rgba(${rgb},0.28)` : "rgba(255,255,255,0.07)"}`,
    color: selected[i] ? `rgb(${rgb})` : "rgba(255,255,255,0.2)",
  });

  const pillStyle = {
    padding:"5px 12px", borderRadius:"50px", fontSize:"13px", fontWeight:"600", flexShrink:0,
    background: ready ? "rgba(168,85,247,0.2)" : "rgba(255,255,255,0.08)",
    color:      ready ? "#a855f7" : "rgba(255,255,255,0.42)",
    border:     `1px solid ${ready ? "rgba(168,85,247,0.42)" : "rgba(255,255,255,0.1)"}`,
  };
  const doneStyle = {
    width:"100%", padding:"16px", borderRadius:"14px", border:"none",
    fontSize:"16px", fontWeight:"600", letterSpacing:"0.3px", fontFamily:"'DM Sans',sans-serif",
    cursor: ready ? "pointer" : "default",
    background: ready ? "linear-gradient(135deg,#a855f7,#ec4899)" : "rgba(255,255,255,0.07)",
    color:      ready ? "#fff" : "rgba(255,255,255,0.3)",
    boxShadow:  ready ? "0 6px 26px rgba(168,85,247,0.38)" : "none",
  };

  return html`
    <div class="screen-vote">
      <div class="vote-header">
        <div style=${{ display:"flex", alignItems:"center", gap:"12px", marginBottom:"0" }}>
          <button class="vote-back" onClick=${onBack}>←</button>
          <div style=${{ flex:1, minWidth:0 }}>
            <div class="vote-cat-label">${catLabel}</div>
            <div class="vote-cat-title">${catTitle}</div>
          </div>
          <div style=${pillStyle}>${selected.length} / 3</div>
        </div>
        <div class="rank-slots">
          ${["245,200,66","200,200,200","205,127,50"].map((rgb, i) => html`
            <div key=${i} class="rank-slot" style=${slotStyle(i, rgb)}>
              <div class="rank-slot-rank">${RANK_LABELS[i]}</div>
              <div class="rank-slot-name">${selected[i] ? selected[i].name.split(" ")[0] : "-"}</div>
            </div>
          `)}
        </div>
      </div>

      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Search contestants…"
          value=${search} onInput=${e => setSearch(e.target.value)}/>
      </div>

      <div class="contestant-list">
        ${filtered.map(c => {
          const ri = selected.findIndex(p => p.id === c.id);
          const isSel = ri >= 0;
          const isMax = !isSel && selected.length >= 3;
          return html`
            <div key=${c.id}
              onClick=${() => !isMax && toggle(c)}
              style=${{
                display:"flex", alignItems:"center", padding:"12px 14px", marginBottom:"5px",
                borderRadius:"12px", cursor: isMax ? "default" : "pointer", opacity: isMax ? 0.35 : 1,
                background: isSel ? "rgba(168,85,247,0.1)" : "rgba(255,255,255,0.03)",
                border: `1px solid ${isSel ? "rgba(168,85,247,0.28)" : "rgba(255,255,255,0.06)"}`,
              }}>
              <div style=${{
                width:"34px", height:"34px", borderRadius:"50%", display:"flex",
                alignItems:"center", justifyContent:"center", flexShrink:0, marginRight:"12px",
                background: ri >= 0 ? RANK_BGS[ri]     : "rgba(255,255,255,0.05)",
                border:    `1px solid ${ri >= 0 ? RANK_BORDERS[ri] : "rgba(255,255,255,0.09)"}`,
                color:      ri >= 0 ? RANK_COLORS[ri]   : "rgba(255,255,255,0.2)",
                fontSize:"10px", fontWeight:"700", letterSpacing:"0.3px",
              }}>
                ${ri >= 0 ? RANK_LABELS[ri] : "–"}
              </div>
              <div style=${{ flex:1, minWidth:0, color:"#f8f4ff", fontSize:"15px", fontWeight:"500",
                            whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                ${c.name}
              </div>
              ${isSel && html`<div style=${{ color:"rgba(168,85,247,0.75)", fontSize:"13px", marginLeft:"8px", flexShrink:0, lineHeight:"1" }}>✦</div>`}
            </div>
          `;
        })}
        <div style=${{ height:"20px" }}></div>
      </div>

      <div class="vote-footer">
        <button style=${doneStyle} onClick=${() => ready && onSave(selected)}>
          ${ready ? "Save Picks ✦" : `Pick ${3 - selected.length} more to continue`}
        </button>
      </div>
    </div>
  `;
}

/* ── Review ── */
function ReviewPage({ localVotes, onSubmit, onBack, submitting, error }) {
  const makePicks = arr => arr.map((c, i) => ({ ...c, i }));
  return html`
    <div class="screen-flow" style=${{ paddingTop:"58px", paddingBottom:"52px" }}>
      <div style=${{ textAlign:"center", marginBottom:"42px" }}>
        <div class="gold-label" style=${{ marginBottom:"9px" }}>Final Review</div>
        <h2 class="display-h2">Your Picks</h2>
        <p style=${{ color:"rgba(248,244,255,0.38)", fontSize:"14px", marginTop:"7px" }}>Confirm before submitting</p>
      </div>

      <div style=${{ marginBottom:"32px" }}>
        <div class="review-section-label">
          <span style=${{ fontSize:"17px" }}>🎤</span>
          <span class="review-section-text" style=${{ color:"rgba(168,85,247,0.9)" }}>Singing Performance</span>
        </div>
        ${makePicks(localVotes.singing).map(c => html`
          <div key=${c.id} style=${{ display:"flex", alignItems:"center", gap:"14px",
            padding:"13px 16px", marginBottom:"8px", borderRadius:"12px",
            background:RANK_BGS[c.i], border:`1px solid ${RANK_BORDERS[c.i]}` }}>
            <div style=${{ fontSize:"11px", fontWeight:"700", letterSpacing:"1px", color:RANK_COLORS[c.i], minWidth:"30px", flexShrink:0 }}>${RANK_LABELS[c.i]}</div>
            <div style=${{ flex:1, color:"#f8f4ff", fontSize:"15px", fontWeight:"500" }}>${c.name}</div>
          </div>
        `)}
      </div>

      <div class="review-divider"></div>

      <div style=${{ marginBottom:"40px" }}>
        <div class="review-section-label">
          <span style=${{ fontSize:"17px" }}>👑</span>
          <span class="review-section-text" style=${{ color:"rgba(236,72,153,0.9)" }}>Best Costume</span>
        </div>
        ${makePicks(localVotes.costume).map(c => html`
          <div key=${c.id} style=${{ display:"flex", alignItems:"center", gap:"14px",
            padding:"13px 16px", marginBottom:"8px", borderRadius:"12px",
            background:RANK_BGS[c.i], border:`1px solid ${RANK_BORDERS[c.i]}` }}>
            <div style=${{ fontSize:"11px", fontWeight:"700", letterSpacing:"1px", color:RANK_COLORS[c.i], minWidth:"30px", flexShrink:0 }}>${RANK_LABELS[c.i]}</div>
            <div style=${{ flex:1, color:"#f8f4ff", fontSize:"15px", fontWeight:"500" }}>${c.name}</div>
          </div>
        `)}
      </div>

      ${error && html`<div style=${{ color:"#f87171", fontSize:"14px", textAlign:"center", marginBottom:"12px" }}>${error}</div>`}

      <div class="review-actions">
        <button class="btn-ghost" onClick=${onBack}>← Edit Votes</button>
        <button class="btn-grad-full" onClick=${onSubmit} disabled=${submitting}
          style=${{ borderRadius:"14px" }}>
          ${submitting ? "Submitting…" : "Submit My Vote ✦"}
        </button>
      </div>
    </div>
  `;
}

/* ── Done ── */
function DonePage({ localVotes }) {
  return html`
    <div class="screen-center">
      <div class="curtain-l"></div>
      <div class="curtain-r"></div>
      <${Stars}/>
      <div class="float-icon" style=${{ fontSize:"58px", marginBottom:"26px" }}>🏆</div>
      <div class="gold-label">Vote Submitted!</div>
      <h2 class="display-h2-lg" style=${{ marginBottom:"14px" }}>Thank<br/>You!</h2>
      <div class="divider-bar"></div>
      <p class="muted" style=${{ maxWidth:"272px", marginBottom:"48px" }}>
        Results will be revealed later tonight —<br/>stay close for the big announcement!
      </p>
      ${localVotes && html`
        <div class="done-summary">
          <div class="done-summary-label">Your selections</div>
          <div style=${{ display:"flex", gap:"16px" }}>
            <div class="done-col">
              <div class="done-col-label" style=${{ color:"rgba(168,85,247,0.88)" }}>🎤 Singing</div>
              ${localVotes.singing.map((c,i) => html`
                <div key=${c.id} class="done-col-item">${i+1}. ${c.name}</div>
              `)}
            </div>
            <div class="done-col-divider"></div>
            <div class="done-col">
              <div class="done-col-label" style=${{ color:"rgba(236,72,153,0.88)" }}>👑 Costume</div>
              ${localVotes.costume.map((c,i) => html`
                <div key=${c.id} class="done-col-item">${i+1}. ${c.name}</div>
              `)}
            </div>
          </div>
        </div>
      `}
    </div>
  `;
}

/* ── Results (public) ── */
function ResultsPage() {
  const [data, setData] = useState(null);
  useEffect(() => { api("/api/results").then(setData).catch(() => {}); }, []);
  if (!data) return html`<div class="screen-center"><${Spinner}/></div>`;
  return html`
    <div class="screen-flow" style=${{ paddingTop:"58px" }}>
      <div style=${{ textAlign:"center", marginBottom:"40px" }}>
        <div class="gold-label">Tonight's Results</div>
        <h2 class="display-h2">The Winners</h2>
      </div>
      ${Object.entries(data.results).map(([cat, rows]) => html`
        <div key=${cat} style=${{ marginBottom:"32px" }}>
          <div class="review-section-label">
            <span style=${{ fontSize:"17px" }}>${cat==="singing"?"🎤":"👑"}</span>
            <span class="review-section-text" style=${{ color: cat==="singing"?"rgba(168,85,247,0.9)":"rgba(236,72,153,0.9)" }}>
              ${cat==="singing"?"Singing Performance":"Best Costume"}
            </span>
          </div>
          ${rows.map((r,i) => html`
            <div key=${r.id} style=${{ display:"flex", alignItems:"center", gap:"12px",
              padding:"13px 16px", marginBottom:"8px", borderRadius:"12px",
              background:RANK_BGS[i]||"rgba(255,255,255,0.03)",
              border:`1px solid ${RANK_BORDERS[i]||"rgba(255,255,255,0.08)"}` }}>
              <span style=${{ fontSize:"18px", width:"28px", textAlign:"center" }}>${RANK_MEDALS[i]||`${i+1}.`}</span>
              <span style=${{ flex:1, color:"#f8f4ff", fontSize:"15px", fontWeight:"500" }}>${r.name}</span>
              <span style=${{ color:RANK_COLORS[i]||"#a78bfa", fontWeight:"700", fontSize:"14px" }}>${r.points} pts</span>
            </div>
          `)}
        </div>
      `)}
    </div>
  `;
}

function Spinner() {
  return html`<div style=${{ width:"40px", height:"40px", margin:"80px auto",
    border:"3px solid rgba(255,255,255,0.08)", borderTopColor:"#a855f7",
    borderRadius:"50%", animation:"spin 0.8s linear infinite" }}></div>`;
}

/* ── App ── */
function App() {
  const [page, setPage]           = useState("loading");
  const [sentEmail, setSentEmail] = useState("");
  const [user, setUser]           = useState(null);
  const [categories, setCategories] = useState({ singing:[], costume:[] });
  const [localVotes, setLocalVotes] = useState({ singing:[], costume:[] });
  const [activeCategory, setActiveCategory] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState("");

  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (token) {
      api(`/api/auth/verify?token=${token}`)
        .then(d => { localStorage.setItem("session_token", d.session_token); window.history.replaceState({}, "", "/"); return api("/api/auth/me"); })
        .then(me => { setUser(me); return api("/api/categories"); })
        .then(d => { setCategories(d.categories); setPage("categories"); })
        .catch(() => setPage("home"));
      return;
    }

    const saved = localStorage.getItem("session_token");
    if (saved) {
      api("/api/auth/me")
        .then(me => { setUser(me); return api("/api/categories").then(d => { setCategories(d.categories); return {me, d}; }); })
        .then(({me, d}) => {
          if (!me.voting_open) {
            api("/api/results").then(() => setPage("results")).catch(() => setPage("done"));
          } else if (me.voted_singing && me.voted_costume) {
            setPage("done");
          } else {
            setPage("categories");
          }
        })
        .catch(() => { localStorage.removeItem("session_token"); setPage("home"); });
    } else {
      setPage("home");
    }
  }, []);

  async function handleSubmit() {
    setSubmitting(true); setSubmitError("");
    try {
      await api("/api/votes", { method:"POST", body:{ category:"singing", selections: localVotes.singing.map((c,i)=>({ contestant_id:c.id, rank:i+1 })) }});
      await api("/api/votes", { method:"POST", body:{ category:"costume", selections: localVotes.costume.map((c,i)=>({ contestant_id:c.id, rank:i+1 })) }});
      setPage("done");
    } catch(e) { setSubmitError(e.message); }
    finally { setSubmitting(false); }
  }

  const shell = (children) => html`
    <div class="shell"><div class="phone"><div class="spotlight"></div>${children}</div></div>
  `;

  if (page === "loading")    return shell(html`<${Spinner}/>`);
  if (page === "home")       return shell(html`<${WelcomePage} onSent=${e => { setSentEmail(e); setPage("check"); }}/>`);
  if (page === "check")      return shell(html`<${CheckEmailPage} email=${sentEmail} onBack=${() => setPage("home")}/>`);
  if (page === "results")    return shell(html`<${ResultsPage}/>`);
  if (page === "done")       return shell(html`<${DonePage} localVotes=${localVotes.singing.length ? localVotes : null}/>`);
  if (page === "review")     return shell(html`<${ReviewPage}
    localVotes=${localVotes}
    submitting=${submitting}
    error=${submitError}
    onSubmit=${handleSubmit}
    onBack=${() => setPage("categories")}/>`);
  if (page === "voting" && activeCategory) return shell(html`<${VotingPage}
    category=${activeCategory}
    contestants=${categories[activeCategory] || []}
    picks=${localVotes[activeCategory]}
    onSave=${picks => { setLocalVotes(prev => ({...prev, [activeCategory]: picks})); setPage("categories"); }}
    onBack=${() => setPage("categories")}/>`);
  if (page === "categories") return shell(html`<${CategoriesPage}
    categories=${categories}
    localVotes=${localVotes}
    onSelectCategory=${cat => { setActiveCategory(cat); setPage("voting"); }}
    onReview=${() => setPage("review")}/>`);

  return shell(html`<${Spinner}/>`);
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
